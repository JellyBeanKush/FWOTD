name: Daily Foreign Word

on:
  schedule:
    # Runs at 15:00 UTC (7:00 AM PST)
    - cron: '0 15 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push history updates back to the repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Word Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate-daily.mjs

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add current-word.txt word-history.json
          git commit -m "Update word history: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
