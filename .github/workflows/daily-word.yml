name: Daily Foreign Word
on:
  schedule:
    - cron: '0 15 * * *' # Runs at 7:00 AM PST / 8:00 AM PDT
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # The script handles the URL and Thread ID internally now
        run: node generate-daily.mjs

      - name: Commit History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add current-word.txt word-history.json
          git commit -m "Update word history [skip ci]" || echo "No changes to commit"
          git push
